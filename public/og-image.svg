<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#4338ca"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- City skyline silhouette -->
  <g fill="#ffffff" opacity="0.08">
    <rect x="50" y="380" width="80" height="250"/>
    <rect x="150" y="320" width="60" height="310"/>
    <rect x="230" y="360" width="90" height="270"/>
    <rect x="340" y="280" width="70" height="350"/>
    <rect x="430" y="340" width="100" height="290"/>
    <rect x="550" y="300" width="60" height="330"/>
    <rect x="630" y="350" width="80" height="280"/>
    <rect x="730" y="260" width="50" height="370"/>
    <rect x="800" y="320" width="90" height="310"/>
    <rect x="910" y="370" width="70" height="260"/>
    <rect x="1000" y="310" width="60" height="320"/>
    <rect x="1080" y="350" width="80" height="280"/>
  </g>
  <!-- Main text -->
  <text x="600" y="220" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="800" fill="#ffffff" letter-spacing="-2">Noida Live</text>
  <!-- Subtitle -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="500" fill="#a5b4fc">Your Complete City Directory</text>
  <!-- Stats row -->
  <text x="600" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#c7d2fe">250+ Listings  |  23 Sections  |  Live Weather  |  GPS Near Me</text>
  <!-- Categories -->
  <text x="600" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#818cf8">Restaurants  ·  Cafes  ·  Malls  ·  Hospitals  ·  Schools  ·  IT Parks  ·  Events  ·  Day Trips</text>
  <!-- URL -->
  <text x="600" y="540" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#e0e7ff">noida.live</text>
  <!-- Decorative line -->
  <rect x="530" y="500" width="140" height="3" rx="2" fill="#6366f1"/>
</svg>
